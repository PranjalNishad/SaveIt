services:
    redis:
        image: redis:7-alpine
        command: redis-server --save 60 1 --loglevel warning
        volumes:
            - redis-data:/data
        restart: unless-stopped

    app:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        environment:
            REDIS_URL: redis://redis:6379
        depends_on:
            - redis
        restart: unless-stopped

volumes:
    redis-data:
